name: Build static surf pages

on:
  push:
    branches:
      - main
    paths:
      - 'surf-news.json'
  workflow_dispatch:

concurrency:
  group: build-static-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build article pages
        run: node scripts/build-surf-pages.mjs

      - name: Commit and push generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add articles/ surf-news-latest.json sitemap.xml feed.xml surf-news.json robots.txt

          if git diff --cached --quiet; then
            echo "✅ Nothing to commit — pages already up to date."
            exit 0
          fi

          git commit -m "chore: rebuild surf pages"

          MAX=5
          COUNT=0
          until git push origin main; do
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -ge "$MAX" ]; then
              echo "❌ Push failed after $MAX attempts."
              exit 1
            fi
            echo "⚠️  Push rejected (attempt $COUNT/$MAX), rebasing…"
            git fetch origin main
            git rebase -X theirs origin/main
          done

          echo "✅ Done — pages-build-deployment will now trigger automatically."
