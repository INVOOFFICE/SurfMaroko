name: Build static surf pages

on:
  # ✅ SOLUTION : écouter surf-news.json mais seulement sur push humain (pas bot)
  push:
    branches:
      - main
    paths:
      - 'surf-news.json'
  workflow_dispatch:

# ❌ ANCIENNE CAUSE DU BUG :
# Le bot commitait avec [skip ci] → GitHub bloquait tous les triggers
# NOUVELLE RÈGLE : on supprime [skip ci] du commit message du bot

concurrency:
  group: build-static-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    # ✅ BLOQUER les commits du bot pour éviter la boucle infinie
    # Si le commit vient du bot lui-même, on skip le job
    if: |
      github.actor != 'github-actions[bot]' ||
      github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build article pages
        run: node scripts/build-surf-pages.mjs

      - name: Commit and push generated pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add articles/ surf-news-latest.json sitemap.xml feed.xml surf-news.json robots.txt

          if git diff --cached --quiet; then
            echo "✅ Nothing to commit, skipping push."
            exit 0
          fi

          # ✅ CORRECTION CLÉ : supprimer [skip ci] du message de commit
          # [skip ci] bloquait le déclenchement de pages-build-deployment
          git commit -m "chore: rebuild surf pages"

          MAX=5
          COUNT=0
          until git push origin main; do
            COUNT=$((COUNT + 1))
            if [ "$COUNT" -ge "$MAX" ]; then
              echo "❌ Push failed after $MAX attempts."
              exit 1
            fi
            echo "⚠️  Push rejected (attempt $COUNT/$MAX), pulling and rebasing…"
            git fetch origin main
            git rebase -X theirs origin/main
          done

          echo "✅ Surf pages pushed successfully."
